{% extends 'base.html' %}
{% block content %}
<div style="max-width: 500px; margin: 60px auto; background: white; padding: 40px; border-radius: 12px;">
    <h2>Register</h2>
    <form method="POST">
        <input type="text" name="fullname" placeholder="Full Name" required class="form-input">
        <input type="email" name="email" placeholder="Email" required class="form-input">
        <input type="password" name="password" id="pw" placeholder="Password" required class="form-input">
        <input type="password" id="pw2" placeholder="Confirm Password" required class="form-input">
        <button type="submit" class="btn" style="width: 100%;">Create Account</button>
    </form>
</div>

<script>
    document.querySelector('form').onsubmit = function(e) {
        if(document.getElementById('pw').value !== document.getElementById('pw2').value) {
            alert("Passwords do not match!");
            e.preventDefault();
        }
    };
</script>

<style>
    .form-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; }
</style>
{% endblock %}
